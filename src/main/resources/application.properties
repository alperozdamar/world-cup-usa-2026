server.port=8090
server.servlet.session.timeout=30d
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://localhost:3306/worldcup
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.version=@project.version@
app.user-bootstrap.enabled=true
app.user-bootstrap.profile=default
app.fixture-timezone=America/New_York
app.base-url=http://localhost:8090
app.mail.enabled=false
app.mail.from=World Cup 2026 <noreply@example.com>
app.reminder.enabled=true
app.reminder.cron=0 0 14 * * *
app.reminder.zone=UTC
app.reminder.match.enabled=true
app.reminder.match.hours-before=3
app.reminder.match.cron=0 0 * * * *
app.security.remember-me-key=${APP_SECURITY_REMEMBER_ME_KEY:worldcup-2026-remember-me-v1}
