server.port=8090
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://localhost:3306/worldcup
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
app.version=@project.version@
app.user-bootstrap.enabled=true
app.user-bootstrap.profile=default
app.fixture-timezone=America/New_York
app.base-url=http://localhost:8090
app.mail.enabled=false
app.mail.from=World Cup 2026 <noreply@example.com>
app.reminder.enabled=true
app.reminder.cron=0 0 14 * * *
app.reminder.zone=UTC
