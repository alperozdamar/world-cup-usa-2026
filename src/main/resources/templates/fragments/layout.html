<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">World Cup 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/predictions/list}">
            <img th:src="@{/images/ataturk.png}" alt="Ataturk" class="navbar-brand-icon">
            World Cup 2026
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/predictions/list}">My Predictions</a>
            <a class="nav-link" th:href="@{/predictions/leaderboard}">Leaderboard</a>
            <a class="nav-link" th:href="@{/rules}">Rules</a>
            <a class="nav-link" th:href="@{/profile/settings}">Profile</a>
            <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/scores}">Admin Scores</a>
            <a class="nav-link" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/audit}">Audit</a>
            <span class="nav-link text-white-50" sec:authentication="name">user</span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-link nav-link">Logout</button>
            </form>
        </div>
    </div>
</nav>
<footer th:fragment="footer" class="app-footer">
    <div class="container text-center">
        <small class="text-muted">
            &copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> Alper Ozdamar
            <span class="mx-1">&middot;</span>
            v<span th:text="${appVersion}">0.0.0</span>
        </small>
    </div>
</footer>
</body>
</html>
