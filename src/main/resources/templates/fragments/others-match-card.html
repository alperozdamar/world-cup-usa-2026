<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="others-match-card(matchView)">
    <div class="card mb-3"
         th:with="knockout=${matchView.match().stage.name() != 'GROUP_STAGE'}">
        <div class="card-header">
            <strong>
                <span th:replace="~{fragments/team-flag :: team-with-flag(name=${matchView.match().homeDisplayName})}"></span>
                vs
                <span th:replace="~{fragments/team-flag :: team-with-flag(name=${matchView.match().awayDisplayName})}"></span>
            </strong>
            <span class="text-muted ms-2">
                · <span th:if="${!knockout}">Group <span th:text="${matchView.match().groupName}"></span> · </span>
                <span th:if="${knockout}" th:text="${@matchViewHelper.formatStageLabel(matchView.match())} + ' · '"></span>
                <span th:text="${@matchViewHelper.formatKickoffDate(matchView.match(), zoneId)}"></span>
                <span th:text="${@matchViewHelper.formatKickoffTime(matchView.match(), zoneId)}"></span>
            </span>
            <span th:if="${matchView.match().scoreEntered}" class="ms-2 badge bg-success">
                Final: <span th:text="${matchView.match().homeScoreActual} + '-' + ${matchView.match().awayScoreActual}"></span>
            </span>
            <span th:if="${matchView.predictionsHidden()}" class="ms-2 badge bg-secondary">Upcoming</span>
        </div>
        <div th:replace="~{fragments/missing-picks-alert :: missing-picks-alert(
                members=${matchView.missingMembers()}, currentUsername=${username}, highlightYou=true)}"></div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-sm table-striped mb-0 align-middle">
                    <thead>
                    <tr th:if="${!knockout}">
                        <th>Player</th>
                        <th>Prediction</th>
                        <th th:if="${matchView.match().scoreEntered and !matchView.predictionsHidden()}">Points</th>
                    </tr>
                    <tr th:if="${knockout}">
                        <th>Player</th>
                        <th>90′ score</th>
                        <th>Penalties</th>
                        <th>Advances</th>
                        <th th:if="${matchView.match().scoreEntered and !matchView.predictionsHidden()}">Points</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="pick : ${matchView.predictions()}">
                        <td>
                            <span th:text="${pick.displayName()}"></span>
                            <span class="small text-muted" th:text="'(' + ${pick.username()} + ')'"></span>
                        </td>
                        <td th:if="${!knockout}">
                            <span th:if="${pick.hidden()}" class="text-muted fst-italic">Hidden until kickoff</span>
                            <span th:if="${!pick.hidden()}" th:text="${pick.homeGuess()} + ' - ' + ${pick.awayGuess()}"></span>
                        </td>
                        <td th:if="${knockout}">
                            <span th:if="${pick.hidden()}" class="text-muted fst-italic">Hidden until kickoff</span>
                            <span th:if="${!pick.hidden()}" th:text="${pick.homeGuess()} + ' - ' + ${pick.awayGuess()}"></span>
                        </td>
                        <td th:if="${knockout}">
                            <span th:if="${pick.hidden()}" class="text-muted">—</span>
                            <span th:if="${!pick.hidden() and pick.penaltyShootoutGuess() == null}" class="text-muted">—</span>
                            <span th:if="${!pick.hidden() and pick.penaltyShootoutGuess() != null}"
                                  th:text="${pick.penaltyShootoutGuess()} ? 'Yes' : 'No'"></span>
                        </td>
                        <td th:if="${knockout}">
                            <span th:if="${pick.hidden()}" class="text-muted">—</span>
                            <span th:if="${!pick.hidden() and pick.advancingTeamName() != null}"
                                  th:text="${pick.advancingTeamName()}"></span>
                            <span th:if="${!pick.hidden() and pick.advancingTeamName() == null}" class="text-muted">—</span>
                        </td>
                        <td th:if="${matchView.match().scoreEntered and !matchView.predictionsHidden()}">
                            <span th:if="${pick.points() != null}"
                                  th:text="${T(com.alper.worldcup.service.PointsFormat).format(pick.points())}"></span>
                            <span th:if="${pick.points() == null}" class="text-muted">—</span>
                        </td>
                    </tr>
                    <tr th:each="member : ${matchView.missingMembers()}">
                        <td>
                            <span th:text="${member.displayName()}"></span>
                            <span class="small text-muted" th:text="'(' + ${member.username()} + ')'"></span>
                        </td>
                        <td th:attr="colspan=${knockout ? (matchView.match().scoreEntered and !matchView.predictionsHidden() ? 4 : 3) : (matchView.match().scoreEntered and !matchView.predictionsHidden() ? 2 : 1)}"
                            class="missing-picks-cell">
                            <span th:if="${member.username() == username}">No prediction yet (you)</span>
                            <span th:if="${member.username() != username}">No prediction yet</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(matchView.predictions()) and #lists.isEmpty(matchView.missingMembers())}">
                        <td th:colspan="${knockout ? (matchView.match().scoreEntered and !matchView.predictionsHidden() ? 5 : 4) : (matchView.match().scoreEntered and !matchView.predictionsHidden() ? 3 : 2)}"
                            class="text-muted">No predictions saved for this match.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
