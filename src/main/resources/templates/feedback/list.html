<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Feedback & Wishes')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h2>Feedback &amp; Wishes</h2>
    <p class="text-muted mb-4">
        Comments, requests, and ideas for the app — visible to everyone in the pool.
        Times shown in <strong th:text="${zoneId}">America/New_York</strong>.
    </p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="card mb-4">
        <div class="card-header">Add your feedback</div>
        <div class="card-body">
            <form th:action="@{/feedback}" method="post">
                <div class="mb-3">
                    <label class="form-label" for="content">Your message</label>
                    <textarea id="content" name="content" class="form-control" rows="4" maxlength="2000"
                              placeholder="Bug reports, feature ideas, rule suggestions…" required></textarea>
                    <div class="form-text">Posting as <strong th:text="${displayName}">Player</strong></div>
                </div>
                <button type="submit" class="btn btn-primary">Post</button>
            </form>
        </div>
    </div>

    <h5 class="mb-3">Everyone's feedback</h5>
    <div th:if="${#lists.isEmpty(comments)}" class="text-muted">No feedback yet — be the first.</div>

    <div th:each="comment : ${comments}" class="card mb-3">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <strong th:text="${displayNames[comment.username]}">Player</strong>
                    <span class="small text-muted" th:text="'(' + ${comment.username} + ')'"></span>
                </div>
                <small class="text-muted text-nowrap ms-2"
                       th:text="${@matchViewHelper.formatRecordedAt(comment.createdAt, zoneId)}"></small>
            </div>
            <p class="mb-0" th:text="${comment.content}">Comment text</p>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
