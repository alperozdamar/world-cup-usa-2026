<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Profile Settings')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container" style="max-width: 520px;">
    <h2>Profile Settings</h2>
    <p class="text-muted">Signed in as <strong th:text="${displayName}">Player</strong></p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/profile/settings}" method="post" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Email (optional)</label>
            <input type="email" name="email" class="form-control" maxlength="255"
                   placeholder="you@example.com"
                   th:value="${email}">
            <div class="form-text">
                Daily reminder if group or final picks are still missing. Leave blank for no emails.
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Your timezone</label>
            <select name="timezoneId" class="form-select" required>
                <option th:each="tz : ${timezones}"
                        th:value="${tz}"
                        th:text="${tz}"
                        th:selected="${tz == timezoneId}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save profile</button>
    </form>

    <hr>
    <h5>Password</h5>
    <p class="text-muted">Change your login password anytime.</p>
    <a th:href="@{/profile/password}" class="btn btn-outline-secondary">Change password</a>

    <div class="mt-4" th:replace="~{fragments/layout :: support-panel}"></div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
