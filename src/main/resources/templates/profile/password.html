<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Change Password')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container" style="max-width: 520px;">
    <h2>Change Password</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/profile/password}" method="post">
        <div class="mb-3">
            <label class="form-label">Current password</label>
            <input type="password" name="currentPassword" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">New password</label>
            <input type="password" name="newPassword" class="form-control" minlength="3" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm new password</label>
            <input type="password" name="confirmPassword" class="form-control" minlength="3" required>
        </div>
        <button type="submit" class="btn btn-primary">Update password</button>
        <a th:href="@{/profile/settings}" class="btn btn-link">Back to settings</a>
    </form>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
