<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Leaderboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h2>Leaderboard</h2>
    <p class="text-muted">Group-stage match scores · group 1st/2nd (3/2/1) · knockout (stage multipliers) · final</p>
    <p class="small text-muted">Tied on total? Higher success rate % wins, then correct champion pick.</p>

    <table class="table table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Player</th>
            <th class="text-end">Match</th>
            <th class="text-end">Group</th>
            <th class="text-end">Knockout</th>
            <th class="text-end">Final</th>
            <th class="text-end">Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row, stat : ${leaderboardRows}"
            th:classappend="${stat.count == 1} ? ' leaderboard-row-leader' : ''">
            <td th:text="${stat.count}"></td>
            <td>
                <div class="leaderboard-player-cell">
                    <div th:replace="~{fragments/layout :: player-club-badge-inline(username=${row.username})}"></div>
                    <div th:replace="~{fragments/layout :: player-avatar(username=${row.username}, displayName=${displayNames[row.username]}, size='sm')}"></div>
                    <div>
                        <span th:text="${displayNames[row.username]}">Player</span>
                        <span class="small text-muted" th:text="'(' + ${row.username} + ')'"></span>
                        <div th:replace="~{fragments/layout :: match-stats-summary(stats=${matchStatsByUsername[row.username]})}"></div>
                    </div>
                </div>
            </td>
            <td class="text-end" th:text="${row.matchPoints}"></td>
            <td class="text-end" th:text="${row.groupPoints}"></td>
            <td class="text-end" th:text="${row.knockoutPoints}"></td>
            <td class="text-end" th:text="${row.finalPoints}"></td>
            <td class="text-end"><strong th:text="${row.totalPoints}"></strong></td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaderboardRows)}">
            <td colspan="7" class="text-muted">No scored predictions yet.</td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/bird-watch :: bird-watch-section}"></div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
