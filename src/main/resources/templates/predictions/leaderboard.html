<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Leaderboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h2>Leaderboard</h2>
    <p class="text-muted">Points will update once scoring rules are configured and match results are entered.</p>

    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Player</th>
            <th>Total Points</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row, stat : ${leaderboard}">
            <td th:text="${stat.count}"></td>
            <td th:text="${row[0]}"></td>
            <td th:text="${row[1]}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaderboard)}">
            <td colspan="3" class="text-muted">No scored predictions yet.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
