<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Leaderboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h2>Leaderboard</h2>
    <p class="text-muted">5 pts exact · 2 pts outcome · +1 goal-diff · group 1st/2nd (3/2/1) · knockout multipliers</p>

    <table class="table table-striped align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Player</th>
            <th>Total Points</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="row, stat : ${leaderboard}"
            th:classappend="${stat.count == 1} ? ' leaderboard-row-leader' : ''">
            <td th:text="${stat.count}"></td>
            <td>
                <div class="leaderboard-player-cell">
                    <div th:replace="~{fragments/layout :: player-club-badge-inline(username=${row[0]})}"></div>
                    <div th:replace="~{fragments/layout :: player-avatar(username=${row[0]}, displayName=${displayNames[row[0]]}, size='sm')}"></div>
                    <div>
                        <span th:text="${displayNames[row[0]]}">Player</span>
                        <span class="small text-muted" th:text="'(' + ${row[0]} + ')'"></span>
                        <div th:replace="~{fragments/layout :: match-stats-summary(stats=${matchStatsByUsername[row[0]]})}"></div>
                    </div>
                </div>
            </td>
            <td th:text="${row[1]}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(leaderboard)}">
            <td colspan="3" class="text-muted">No scored predictions yet.</td>
        </tr>
        </tbody>
    </table>

    <div th:replace="~{fragments/bird-watch :: bird-watch-section}"></div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
