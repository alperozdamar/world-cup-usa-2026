<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Group Stage Predictions')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h2>Group Stage Predictions</h2>
            <p class="text-muted mb-0">
                Times shown in <strong th:text="${zoneId}">America/New_York</strong>.
                Predictions lock at kickoff (UTC).
            </p>
            <p class="text-muted small mb-0 mt-1">
                <a th:href="@{/profile/settings}">Set your timezone</a> in Profile to see kickoffs in your local time.
            </p>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Group</th>
                <th>Match</th>
                <th>Your Guess</th>
                <th>Status</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="match : ${matches}">
                <td th:text="${@matchViewHelper.formatKickoffDate(match, zoneId)}"></td>
                <td th:text="${@matchViewHelper.formatKickoffTime(match, zoneId)}"></td>
                <td th:text="'Group ' + ${match.groupName}"></td>
                <td>
                    <span th:text="${match.homeDisplayName}"></span>
                    vs
                    <span th:text="${match.awayDisplayName}"></span>
                    <div class="small text-muted" th:text="${match.venue} + ', ' + ${match.city}"></div>
                </td>
                <td>
                    <span th:if="${predictions[match.id] != null}"
                          th:text="${predictions[match.id].homeScoreGuess} + ' - ' + ${predictions[match.id].awayScoreGuess}"></span>
                    <span th:if="${predictions[match.id] == null}" class="text-muted">—</span>
                    <div th:if="${match.scoreEntered}" class="small text-success">
                        Actual:
                        <span th:text="${match.homeScoreActual} + ' - ' + ${match.awayScoreActual}"></span>
                        <span th:if="${predictions[match.id]?.points != null}">
                            · Points: <span th:text="${predictions[match.id].points}"></span>
                        </span>
                    </div>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${@matchViewHelper.isEditable(match)} ? ' bg-success' : ' bg-secondary'"
                          th:text="${@matchViewHelper.statusLabel(match, predictions[match.id])}">
                    </span>
                </td>
                <td>
                    <form th:if="${@matchViewHelper.isEditable(match)}"
                          th:action="@{/predictions/save}" method="post" class="d-flex gap-1">
                        <input type="hidden" name="matchId" th:value="${match.id}">
                        <input type="number" name="homeScore" min="0" max="20" class="form-control form-control-sm"
                               style="width:4rem" required
                               th:value="${predictions[match.id]?.homeScoreGuess}">
                        <span class="align-self-center">-</span>
                        <input type="number" name="awayScore" min="0" max="20" class="form-control form-control-sm"
                               style="width:4rem" required
                               th:value="${predictions[match.id]?.awayScoreGuess}">
                        <button type="submit" class="btn btn-sm btn-primary">Save</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
