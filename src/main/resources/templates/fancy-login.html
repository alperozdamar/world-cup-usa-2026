<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - World Cup 2026</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/app.css}" rel="stylesheet">
    <style>
        html, body { height: 100%; background: #0b3d2e; }
        body.login-page { flex-direction: column; }
        .login-page-main { flex: 1; }
        .login-card { max-width: 420px; }
        .login-brand-icon {
            height: 62px;
            width: 52px;
            object-fit: cover;
            border-radius: 2px;
        }
        .login-footer { color: rgba(255, 255, 255, 0.55); font-size: 0.875rem; }
    </style>
</head>
<body class="login-page d-flex">
<div th:replace="~{fragments/layout :: world-clocks}"></div>
<div class="login-page-main d-flex align-items-center justify-content-center flex-column w-100">
<div class="card login-card shadow">
    <div class="card-header bg-success text-white text-center py-3">
        <h4 class="mb-0 d-flex align-items-center justify-content-center gap-2">
            <img th:src="@{/images/ataturk.png}" alt="Ataturk" class="login-brand-icon">
            World Cup 2026 Pool
        </h4>
    </div>
    <div class="card-body p-4">
        <form th:action="@{/authenticateTheUser}" method="post">
            <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
            <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Sign In</button>
        </form>
    </div>
</div>
<p class="login-footer mt-4 mb-0">
    &copy; <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> Alper Ozdamar
    <span class="mx-1">&middot;</span>
    v<span th:text="${appVersion}">0.0.0</span>
</p>
</div>
<script th:src="@{/js/world-clocks.js}" defer></script>
</body>
</html>
