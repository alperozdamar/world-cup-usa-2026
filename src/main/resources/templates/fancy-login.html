<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - World Cup 2026</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; background: #0b3d2e; }
        .login-card { max-width: 420px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="card login-card shadow">
    <div class="card-header bg-success text-white text-center py-3">
        <h4 class="mb-0">World Cup 2026 Pool</h4>
    </div>
    <div class="card-body p-4">
        <form th:action="@{/authenticateTheUser}" method="post">
            <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
            <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Sign In</button>
        </form>
        <p class="text-muted text-center mt-3 mb-0 small">Version: <span th:text="${appVersion}">1.0.0</span></p>
    </div>
</div>
</body>
</html>
